<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Premium | Jun Phạm</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #030303; --bg-card: rgba(12, 12, 15, 0.95);
            --primary: #00f0ff; --secondary: #7000ff; --text-main: #ffffff;
            --text-muted: #888888;
            --glass-border: rgba(255, 255, 255, 0.08);
            --gradient-text: linear-gradient(90deg, var(--primary), var(--secondary));
            --neon-shadow: 0 0 35px rgba(0, 240, 255, 0.3);
            --card-shadow: 0 30px 60px rgba(0,0,0,0.95);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; outline: none !important; }
        h1, h2, h3, h4, h5, h6, .logo { font-family: 'Space Grotesk', sans-serif !important; }
        
        body { background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; overflow-x: hidden; line-height: 1.6; }
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.3; pointer-events: none; }
        
        header { position: fixed; top: 0; width: 100%; padding: 15px 5%; background: rgba(3, 3, 3, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 30px rgba(0,0,0,0.8); }
        .logo { font-size: 1.6rem; font-weight: 700; background: var(--gradient-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 2.5px; }

        .main-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 100px 15px 50px; position: relative; z-index: 1; }
        
        .glass-card { background: var(--bg-card); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 45px 35px; width: 100%; max-width: 1000px; position: relative; display: none; box-shadow: var(--card-shadow); }
        .glass-card.active { display: block; animation: fadeIn 0.4s ease-out; }
        .glass-card::after { content: ''; position: absolute; inset: -1px; border-radius: 24px; padding: 1.5px; background: linear-gradient(135deg, rgba(0, 240, 255, 0.4), rgba(112, 0, 255, 0.4)); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0.3; pointer-events: none; }

        .upload-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed rgba(255, 255, 255, 0.15); border-radius: 16px; padding: 45px 20px; text-align: center; cursor: pointer; transition: 0.3s; background: rgba(255, 255, 255, 0.01); margin-bottom: 25px; width: 100%; z-index: 10; position: relative;}
        .upload-zone:hover { border-color: var(--primary); background: rgba(0, 240, 255, 0.04); box-shadow: 0 0 25px rgba(0, 240, 255, 0.15); transform: translateY(-2px); }
        .upload-zone i { font-size: 3.5rem; background: var(--gradient-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; filter: drop-shadow(0 0 12px rgba(112, 0, 255, 0.4)); }
        
        .btn-cyber { padding: 16px 32px; background: linear-gradient(135deg, #00f0ff 0%, #0099ff 100%); color: #000; border: none; border-radius: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer; box-shadow: 0 0 20px rgba(0, 240, 255, 0.3); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; font-size: 1rem; letter-spacing: 1px; z-index: 10; position: relative;}
        .btn-cyber:hover { transform: translateY(-4px); box-shadow: 0 0 40px rgba(0, 240, 255, 0.6); }

        .edit-row { background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 18px; padding: 25px; margin-bottom: 30px; position: relative; width: 100%; z-index: 10; transition: 0.3s; }
        .edit-row:hover { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.03); }
        
        .rendered-q { font-size: 1.2rem; color: #fff; line-height: 1.5; cursor: pointer; padding: 12px; border-radius: 8px; transition: 0.3s; margin-bottom: 15px; font-weight: 600;}
        .rendered-q:hover { background: rgba(0,240,255,0.08); outline: 1px dashed var(--primary); }
        
        .raw-editor { display: none; width: 100%; height: 110px; background: #000; color: #fff; border: 1px solid var(--primary); border-radius: 8px; padding: 15px; margin-bottom: 15px; font-family: monospace; resize: vertical; font-size: 0.95rem; }

        .edit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; width: 100%; }
        .opt-item-wrapper { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.6); padding: 12px 18px; border-radius: 10px; border: 1px solid #222; min-height: 52px; transition: 0.3s; }
        .opt-item-wrapper:hover { border-color: #444; }
        .opt-item-wrapper b { color: var(--primary); font-weight: 800; font-size: 1.1rem; }
        .rendered-opt { flex: 1; cursor: pointer; padding: 5px; border-radius: 4px; transition: 0.2s; font-size: 1.05rem; color: #ddd;}
        .rendered-opt:hover { background: rgba(0,240,255,0.1); color: #fff; }
        .raw-opt-editor { display: none; flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 1rem; font-family: monospace; }

        .ans-selector { display: flex; gap: 12px; margin-top: 25px; align-items: center; z-index: 10; position: relative; flex-wrap: wrap;}
        .letter-circle { width: 42px; height: 42px; border-radius: 50%; border: 1px solid #444; background: transparent; color: #fff; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; font-size: 1.1rem;}
        .letter-circle:hover { border-color: #888; transform: scale(1.05); }
        .letter-circle.active { background: var(--primary); color: #000; box-shadow: 0 0 20px rgba(0, 240, 255, 0.5); border-color: var(--primary); transform: scale(1.1); }

        .play-card { background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); padding: 35px; border-radius: 20px; margin-bottom: 30px; width: 100%; z-index: 10; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
        .play-card .q-text { font-size: 1.25rem; margin-bottom: 20px; font-weight: 700; line-height: 1.5; color: #fff; }
        .choice-row { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin: 15px 0; cursor: pointer; font-size: 1.1rem; transition: 0.25s cubic-bezier(0.175, 0.885, 0.32, 1); z-index: 10; position: relative; display: flex; align-items: center; gap: 15px;}
        .choice-row:hover { transform: translateX(8px); border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.03); }
        .choice-row.selected { border-color: var(--primary); background: rgba(0, 240, 255, 0.1); box-shadow: 0 0 25px rgba(0, 240, 255, 0.25); color: var(--primary); font-weight: 600; }
        .choice-row.correct { border-color: #00e676; background: rgba(0, 230, 118, 0.15); color: #00e676; box-shadow: 0 0 30px rgba(0, 230, 118, 0.3); font-weight: 600;}
        .choice-row.wrong { border-color: #ff4c4c; background: rgba(255, 76, 76, 0.15); color: #ff4c4c; box-shadow: 0 0 30px rgba(255, 76, 76, 0.3); font-weight: 600;}

        .summary-box { text-align: center; padding: 45px; background: rgba(0,240,255,0.05); border-radius: 20px; border: 2px solid var(--primary); margin-bottom: 35px; width: 100%; z-index: 10; position: relative; box-shadow: var(--neon-shadow); }
        .summary-box h2 { font-size: 2.2rem; color: var(--primary); margin-bottom: 10px; }
        .summary-box p { color: #ccc; font-size: 1.1rem; }
        
        .thumb { width: 65px; height: 65px; object-fit: cover; border-radius: 10px; border: 2px solid var(--primary); margin: 6px; box-shadow: 0 0 15px rgba(0,0,0,0.6); transition: 0.3s; cursor: pointer; }
        .thumb:hover { transform: scale(1.15); border-color: var(--secondary); }
        
        textarea#text-input { width: 100%; height: 110px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid var(--glass-border); border-radius: 12px; padding: 18px; resize: none; margin-bottom: 25px; transition: 0.3s; font-size: 1rem; z-index: 10; position: relative;}
        textarea#text-input:focus { outline: none !important; border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 240, 255, 0.15); background: rgba(0,0,0,0.7); }
        #batch-status { text-align: center; color: var(--primary); font-weight: 800; margin-bottom: 20px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; animation: pulse 1.5s infinite; }

        .btn-exit { margin-top: 25px; background: transparent; border: 1px solid #555; color: #bbb; transition: 0.3s; width: auto; font-size: 0.9rem; padding: 12px 25px; box-shadow: none;}
        .btn-exit:hover { border-color: #888; color: #fff; background: rgba(255,255,255,0.05); transform: scale(0.98); }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; text-shadow: 0 0 15px var(--primary); } 100% { opacity: 0.6; } }

        @media (max-width: 768px) {
            .logo { font-size: 1.3rem; }
            .glass-card { padding: 30px 20px; border-radius: 16px; }
            .main-wrapper { padding-top: 90px; }
            .rendered-q, .play-card .q-text { font-size: 1.1rem; }
            .edit-grid { grid-template-columns: 1fr; }
            #scr-modes > div { grid-template-columns: 1fr; gap: 20px;}
            .btn-cyber { padding: 14px 20px; font-size: 0.95rem;}
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <header>
        <div class="logo">AI QUIZ PREMIUM</div>
    </header>

    <div class="main-wrapper">
        <div id="scr-input" class="glass-card active">
            <h2 style="color:var(--primary); margin-bottom:25px; text-align: center;"><i class="fas fa-magic"></i> GIẢI MÃ ĐỀ THI BẰNG AI</h2>
            
            <button id="btn-load-local" class="btn-cyber" style="margin-bottom:25px; background:rgba(0,0,0,0.5); border:1px solid rgba(0, 240, 255, 0.4); color:var(--text-main); display:none; box-shadow: none;" onclick="loadSavedSession()">
                <i class="fas fa-history"></i> TIẾP TỤC ĐỀ ĐANG LÀM DỞ
            </button>

            <div id="batch-status" style="display:none">ĐANG ĐỌC FILE...</div>
            
            <label class="upload-zone" for="file-upload">
                <i class="fas fa-file-export"></i>
                <p style="font-weight:800; font-size:1.2rem; margin-bottom: 8px;">TẢI ĐỀ THI CỦA BẠN VÀO ĐÂY</p>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Hỗ trợ phân tích: JPG, PNG, PDF, DOCX</p>
                <input type="file" id="file-upload" multiple accept="image/*,.pdf,.docx" style="display:none" onchange="handleFiles(event)">
            </label>
            
            <div id="thumb-container" style="display:flex; flex-wrap:wrap; justify-content:center; margin-bottom:25px; z-index: 10; position: relative;"></div>
            
            <textarea id="text-input" placeholder="Dán văn bản có sẵn tại đây (nếu có)..."></textarea>
            
            <button class="btn-cyber" type="button" onclick="startSmartBatch()"><i class="fas fa-microchip"></i> BẮT ĐẦU BÓC TÁCH BẰNG AI</button>
        </div>

        <div id="scr-review" class="glass-card">
            <h2 style="color:var(--primary); margin-bottom:20px; text-align: center;"><i class="fas fa-edit"></i> SOÁT LỖI DỮ LIỆU NGUỒN</h2>
            <p style="color:var(--text-muted); font-size:0.95rem; text-align: center; margin-bottom:30px; z-index: 10; position: relative; max-width: 650px; margin-left: auto; margin-right: auto;">Vui lòng bấm trực tiếp vào văn bản để chỉnh sửa nếu AI nhận diện chưa chính xác (đặc biệt là công thức Toán học).</p>
            
            <div id="editor-container" style="max-height: 520px; overflow-y: auto; padding-right: 15px; margin-bottom: 35px; width: 100%; z-index: 10; position: relative;"></div>
            
            <button class="btn-cyber" type="button" onclick="confirmAndProceed()"><i class="fas fa-check-circle"></i> CHỐT ĐỀ & CHUYỂN SANG ÔN LUYỆN</button>
        </div>

        <div id="scr-modes" class="glass-card">
            <h2 style="color:var(--primary); margin-bottom:40px; text-align:center;"><i class="fas fa-graduation-cap"></i> CHỌN CHẾ ĐỘ HỌC</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px; width: 100%; z-index: 10; position: relative;">
                <button class="btn-cyber" type="button" style="height:170px; flex-direction:column; background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.06) 100%); color: #fff; border: 1px solid rgba(255,255,255,0.1); box-shadow: none;" onclick="startLearn()">
                    <i class="fas fa-book-reader fa-2x" style="color: var(--primary); margin-bottom: 10px;"></i><br>HỌC THUỘC<br><span style="font-size: 0.85rem; text-transform: none; color: #aaa; margin-top: 5px; font-weight: normal;">(Hiện ngay đáp án & lời giải)</span>
                </button>
                <button class="btn-cyber" type="button" style="height:170px; flex-direction:column; background: linear-gradient(135deg, #7000ff 0%, #a200ff 100%); color:#fff; box-shadow: 0 0 20px rgba(112,0,255,0.4);" onclick="startTest()">
                    <i class="fas fa-stopwatch fa-2x" style="margin-bottom: 10px;"></i><br>THI THỬ SÁT HẠCH<br><span style="font-size: 0.85rem; text-transform: none; color: #e0d0ff; margin-top: 5px; font-weight: normal;">(Trộn câu hỏi & Tính điểm)</span>
                </button>
            </div>
            <div style="text-align: center;">
                <button class="btn-cyber btn-exit" type="button" onclick="confirmToScr('scr-input')"><i class="fas fa-arrow-left"></i> QUAY LẠI TRANG TẢI ĐỀ</button>
            </div>
        </div>

        <div id="scr-play" class="glass-card">
            <h2 id="play-title" style="color:var(--primary); margin-bottom:30px; text-align: center;"></h2>
            
            <div id="summary-box" class="summary-box" style="display:none"></div>
            
            <div id="play-container" style="max-height: 520px; overflow-y: auto; padding-right: 15px; width: 100%; z-index: 10; position: relative;"></div>
            
            <button id="btn-submit" class="btn-cyber" type="button" style="display:none; margin-top:35px;" onclick="showResult()"><i class="fas fa-paper-plane"></i> NỘP BÀI THI</button>
            
            <div style="text-align: center;">
                <button class="btn-cyber btn-exit" type="button" onclick="safeQuitExam()"><i class="fas fa-sign-out-alt"></i> THOÁT KHỎI BÀI THI</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let pArr = [];
        class P { constructor() { this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.s=Math.random()*1.8; this.sx=Math.random()*0.3-0.15; this.sy=Math.random()*0.3-0.15; this.c=Math.random()>0.5?'#00f0ff':'#7000ff'; } u() { this.x+=this.sx; this.y+=this.sy; if(this.x<0||this.x>canvas.width)this.sx*=-1; if(this.y<0||this.y>canvas.height)this.sy*=-1; } d() { ctx.fillStyle=this.c; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fill(); } }
        for(let i=0;i<40;i++) pArr.push(new P());
        function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); pArr.forEach(p=>{p.u();p.d();}); requestAnimationFrame(anim); }
        anim();

        const WORKER_URL = "/api/gemini"; 
        const MODELS_TO_TRY = ["gemini-3.1-flash-lite", "gemini-2.5-flash", "gemini-1.5-flash"];
        
        const mathOptions = { delimiters: [{left: '$$', right: '$$', display: true}, {left: '\\[', right: '\\]', display: true}, {left: '$', right: '$', display: false}, {left: '\\(', right: '\\)', display: false}], throwOnError: false };
        
        let masterQuiz = []; let uploadImgs = []; let activeExam = []; let userAns = {};

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        document.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('aiQuizData')) document.getElementById('btn-load-local').style.display = 'flex';
        });

        function saveLocal() { localStorage.setItem('aiQuizData', JSON.stringify(masterQuiz)); }
        function loadSavedSession() { try { masterQuiz = JSON.parse(localStorage.getItem('aiQuizData')); if(masterQuiz && masterQuiz.length > 0) { renderReviewUI(); toScr('scr-review'); } } catch(e) { alert("Lỗi tải dữ liệu lưu trữ!"); } }

        async function handleFiles(e) {
            const container = document.getElementById('thumb-container'); const status = document.getElementById('batch-status');
            uploadImgs = []; const files = Array.from(e.target.files);
            if(files.length > 0) { status.innerText = "ĐANG ĐỌC FILE..."; status.style.display = 'block'; }

            for (let file of files) {
                if (file.type.match('image.*')) {
                    const base64 = await readFileAsDataURL(file); uploadImgs.push({ mimeType: file.type, data: base64.split(',')[1] }); addThumb(base64, container);
                } else if (file.type === 'application/pdf') {
                    await processPDF(file, container);
                } else if (file.name.endsWith('.docx')) {
                    await processWord(file);
                }
            }
            status.style.display = 'none';
        }

        function readFileAsDataURL(file) { return new Promise((resolve) => { const reader = new FileReader(); reader.onload = (e) => resolve(e.target.result); reader.readAsDataURL(file); }); }
        function addThumb(src, container) { const img = document.createElement('img'); img.src = src; img.className = 'thumb'; container.appendChild(img); }

        async function processPDF(file, container) {
            try {
                const arrayBuffer = await file.arrayBuffer(); const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i); const viewport = page.getViewport({scale: 1.5});
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); canvas.width = viewport.width; canvas.height = viewport.height;
                    await page.render({canvasContext: ctx, viewport: viewport}).promise;
                    const base64 = canvas.toDataURL('image/jpeg'); uploadImgs.push({ mimeType: 'image/jpeg', data: base64.split(',')[1] }); addThumb(base64, container);
                }
            } catch(e) {}
        }

        async function processWord(file) {
            try {
                const arrayBuffer = await file.arrayBuffer(); const result = await mammoth.extractRawText({arrayBuffer: arrayBuffer});
                const textInput = document.getElementById('text-input'); textInput.value += (textInput.value ? '\n\n' : '') + result.value;
            } catch(e) {}
        }

        async function fetchAndParse(parts) {
            let lastError = null;
            for (let modelName of MODELS_TO_TRY) {
                try {
                    const res = await fetch(WORKER_URL, {
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ 
                            model: modelName,
                            payload: {
                                contents: [{ parts }],
                                generationConfig: { responseMimeType: "application/json" }
                            }
                        })
                    });
                    
                    const d = await res.json();
                    
                    if (!res.ok) {
                        throw new Error(d.error ? d.error.message : "HTTP " + res.status);
                    }
                    
                    let textResult = "";
                    if (d.candidates && d.candidates.length > 0 && 
                        d.candidates[0].content && d.candidates[0].content.parts && 
                        d.candidates[0].content.parts.length > 0) {
                        textResult = d.candidates[0].content.parts[0].text;
                    } else {
                        throw new Error("AI trả về dữ liệu rỗng.");
                    }

                    textResult = textResult.replace(/```json/g,'').replace(/```/g,'').trim();
                    const startIndex = textResult.indexOf('['); const endIndex = textResult.lastIndexOf(']');
                    if(startIndex !== -1 && endIndex !== -1) {
                        textResult = textResult.substring(startIndex, endIndex + 1);
                    }
                    textResult = textResult.replace(/,\s*([\]}])/g, '$1');

                    const json = JSON.parse(textResult);
                    if(Array.isArray(json)) masterQuiz = [...masterQuiz, ...json];
                    return; 
                } catch (e) { 
                    lastError = e; 
                }
            }
            throw lastError; 
        }

        async function startSmartBatch() {
            const extra = document.getElementById('text-input').value; const status = document.getElementById('batch-status'); 
            if(uploadImgs.length === 0 && !extra.trim()) return;
            
            status.style.display = 'block'; masterQuiz = [];
            const batchSize = 1; const totalBatches = uploadImgs.length;
            const prompt = `Trích xuất 100% câu hỏi trắc nghiệm từ ảnh. Dùng $...$ cho công thức Toán/LaTeX. BẮT BUỘC TRẢ VỀ ĐÚNG ĐỊNH DẠNG MẢNG JSON HỢP LỆ, không kèm theo văn bản nào khác. Hãy cẩn thận escape các dấu ngoặc kép (\\") và dấu backslash (\\\\). Cấu trúc mẫu: [{"question": "...", "options": ["...", "..."], "correctIndex": 0, "explanation": "..."}]`;

            try {
                if (uploadImgs.length === 0) {
                    status.innerText = `🔄 AI ĐANG PHÂN TÍCH VĂN BẢN...`;
                    await fetchAndParse([{ text: `${prompt}\n\n${extra}` }]);
                } else {
                    for (let i = 0; i < uploadImgs.length; i += batchSize) {
                        const chunk = uploadImgs.slice(i, i + batchSize);
                        status.innerText = `🔍 AI ĐANG BÓC TÁCH NHÓM ${Math.floor(i/batchSize)+1}/${totalBatches}...`;
                        const parts = [{ text: prompt + (i===0 ? "\nText bổ sung: " + extra : "") }];
                        chunk.forEach(m => parts.push({ inlineData: m }));
                        
                        await fetchAndParse(parts).catch(e => {
                            status.innerText = `⚠️ Lỗi quét ảnh ${Math.floor(i/batchSize)+1}. Đang tự động quét tiếp...`;
                        });

                        if (i + batchSize < uploadImgs.length) {
                            status.innerText = `❄️ LÀM MÁT AI ĐỂ TRÁNH QUÁ TẢI (Đợi 4s)...`;
                            await sleep(4000); 
                        }
                    }
                }
                status.style.display = 'none';
                if(masterQuiz.length > 0) { saveLocal(); renderReviewUI(); toScr('scr-review'); document.getElementById('btn-load-local').style.display = 'flex'; }
            } catch (error) { 
                status.style.display = 'none'; 
            }
        }

        function renderReviewUI() {
            const container = document.getElementById('editor-container'); container.innerHTML = '';
            masterQuiz.forEach((q, i) => {
                const div = document.createElement('div'); div.className = 'edit-row';
                let optionsHTML = q.options.map((o, oi) => `
                    <div class="opt-item-wrapper"><b>${String.fromCharCode(65+oi)}</b>
                        <div class="rendered-opt" id="opt-view-${i}-${oi}" onclick="toggleOptEdit(${i}, ${oi})">${String(o).replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
                        <input class="raw-opt-editor" id="opt-raw-${i}-${oi}" value="${String(o).replace(/"/g, '&quot;')}" onblur="finishOptEdit(${i}, ${oi})">
                    </div>`).join('');
                div.innerHTML = `
                    <div class="rendered-q" id="q-view-${i}" onclick="toggleEdit(${i})">Câu ${i+1}: ${String(q.question).replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
                    <textarea class="raw-editor" id="q-raw-${i}" onblur="finishEdit(${i})">${String(q.question).replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
                    <div class="edit-grid">${optionsHTML}</div>
                    <div class="ans-selector"><span style="font-weight: 600; color: #aaa; margin-right: 5px;">ĐÁP ÁN ĐÚNG:</span>
                        ${q.options.map((_,oi)=>`<button type="button" class="letter-circle ${oi===q.correctIndex?'active':''}" onclick="setCorrectIdx(${i}, ${oi}, this)">${String.fromCharCode(65+oi)}</button>`).join('')}
                    </div>`;
                container.appendChild(div);
            });
            setTimeout(() => { masterQuiz.forEach((q, i) => { renderMathSafe(`q-view-${i}`); q.options.forEach((_, oi) => renderMathSafe(`opt-view-${i}-${oi}`)); }); }, 50);
        }

        function toggleEdit(idx) { document.getElementById(`q-view-${idx}`).style.display = 'none'; const raw = document.getElementById(`q-raw-${idx}`); raw.style.display = 'block'; raw.focus(); }
        function finishEdit(idx) { const rawVal = document.getElementById(`q-raw-${idx}`).value; masterQuiz[idx].question = rawVal; const view = document.getElementById(`q-view-${idx}`); view.innerHTML = `Câu ${idx+1}: ${String(rawVal).replace(/</g, '&lt;').replace(/>/g, '&gt;')}`; view.style.display = 'block'; document.getElementById(`q-raw-${idx}`).style.display = 'none'; renderMathSafe(`q-view-${idx}`); saveLocal(); }
        function toggleOptEdit(qIdx, oIdx) { document.getElementById(`opt-view-${qIdx}-${oIdx}`).style.display = 'none'; const raw = document.getElementById(`opt-raw-${qIdx}-${oIdx}`); raw.style.display = 'block'; raw.focus(); }
        function finishOptEdit(qIdx, oIdx) { const rawVal = document.getElementById(`opt-raw-${qIdx}-${oIdx}`).value; masterQuiz[qIdx].options[oIdx] = rawVal; const view = document.getElementById(`opt-view-${qIdx}-${oIdx}`); view.innerHTML = String(rawVal).replace(/</g, '&lt;').replace(/>/g, '&gt;'); view.style.display = 'block'; document.getElementById(`opt-raw-${qIdx}-${oIdx}`).style.display = 'none'; renderMathSafe(`opt-view-${qIdx}-${oIdx}`); saveLocal(); }
        function setCorrectIdx(qIdx, oIdx, btn) { masterQuiz[qIdx].correctIndex = oIdx; btn.parentNode.querySelectorAll('.letter-circle').forEach(b => b.classList.remove('active')); btn.classList.add('active'); saveLocal(); }

        function renderMathSafe(id) { const el = document.getElementById(id); if(window.renderMathInElement && el) { try { renderMathInElement(el, mathOptions); } catch (e) {} } }

        function startLearn() {
            toScr('scr-play'); document.getElementById('play-title').innerHTML = "<i class='fas fa-book-reader'></i> CHẾ ĐỘ HỌC THUỘC"; const box = document.getElementById('play-container'); box.innerHTML = '';
            masterQuiz.forEach((q, i) => { box.innerHTML += `<div class="play-card"><p class="q-text">${i+1}. ${String(q.question).replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p>
                ${q.options.map((o,oi)=>`<div class="choice-row ${oi==q.correctIndex?'correct':''}"><b>${String.fromCharCode(65+oi)}.</b> <span class="math-opt">${String(o).replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span></div>`).join('')}
                <p style="color:var(--primary); font-size:1rem; margin-top:22px; border-left:4px solid var(--primary); padding-left:18px; background: rgba(0,240,255,0.05); padding-block: 10px; border-radius: 0 8px 8px 0;"><i>💡 ${String(q.explanation).replace(/</g, '&lt;').replace(/>/g, '&gt;')}</i></p></div>`; });
            try { renderMathInElement(box, mathOptions); } catch(e) {}
        }

        function startTest() {
            toScr('scr-play'); document.getElementById('play-title').innerHTML = "<i class='fas fa-stopwatch'></i> BÀI THI ĐÁNH GIÁ NĂNG LỰC"; document.getElementById('btn-submit').style.display = 'flex';
            const box = document.getElementById('play-container'); box.innerHTML = ''; userAns = {}; activeExam = JSON.parse(JSON.stringify(masterQuiz)).sort(() => Math.random() - 0.5);
            activeExam.forEach((q, i) => {
                let realCorrect = q.options[q.correctIndex]; q.options.sort(() => Math.random() - 0.5); q.newIdx = q.options.indexOf(realCorrect);
                const d = document.createElement('div'); d.className = 'play-card'; d.innerHTML = `<p class="q-text">Câu ${i+1}: ${String(q.question).replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p>`;
                q.options.forEach((o, oi) => { const r = document.createElement('div'); r.className = `choice-row user-pick-${i}`; r.innerHTML = `<b style="color: #aaa; margin-right: 10px;">${String.fromCharCode(65+oi)}.</b> <span class="math-opt">${String(o).replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>`;
                    r.onclick = () => { userAns[i] = oi; document.querySelectorAll(`.user-pick-${i}`).forEach(x => x.classList.remove('selected')); r.classList.add('selected'); }; d.appendChild(r); });
                box.appendChild(d);
            });
            try { renderMathInElement(box, mathOptions); } catch(e) {}
        }

        function showResult() {
            if (Object.keys(userAns).length < activeExam.length) { if(!confirm("Bạn vẫn chưa chọn hết đáp án! Có chắc chắn muốn nộp bài luôn không?")) return; }
            let s = 0; activeExam.forEach((q, i) => {
                const rs = document.querySelectorAll(`.user-pick-${i}`); rs.forEach(r => r.style.pointerEvents = 'none');
                if(userAns[i] === q.newIdx) s++;
                if(userAns[i] !== undefined) rs[userAns[i]].classList.add(userAns[i]==q.newIdx?'correct':'wrong');
                if (rs[q.newIdx]) rs[q.newIdx].classList.add('correct');
            });
            const board = document.getElementById('summary-box'); board.style.display = 'block';
            board.innerHTML = `<h2>🎯 KẾT QUẢ ĐẠT ĐƯỢC: ${s} / ${activeExam.length}</h2><p>Xem lại chi tiết bài làm phía bên dưới nhé!</p>`;
            document.getElementById('btn-submit').style.display = 'none'; document.getElementById('play-container').scrollTo(0,0);
        }

        function toScr(id) { document.querySelectorAll('.glass-card').forEach(s => s.classList.remove('active')); const target = document.getElementById(id); if (target) target.classList.add('active'); const summaryBox = document.getElementById('summary-box'); if (summaryBox) summaryBox.style.display = 'none'; const btnSubmit = document.getElementById('btn-submit'); if (btnSubmit) btnSubmit.style.display = 'none'; window.scrollTo({ top: 0, behavior: 'smooth' }); }
        
        function confirmToScr(id) {
            if(confirm("🚧 CẢNH BÁO: Dữ liệu đề thi hiện tại có thể bị mất nếu bạn quay lại. Chắc chắn muốn quay lại trang chủ chứ?")) {
                toScr(id);
            }
        }
        
        function safeQuitExam() {
            const isTesting = document.getElementById('btn-submit').style.display === 'flex';
            if(isTesting && Object.keys(userAns).length > 0) {
                 if(confirm("🚧 CẢNH BÁO: Bài thi đang diễn ra! Nếu thoát bây giờ, mọi đáp án bạn chọn sẽ bị xóa sạch. Bạn có chắc chắn muốn thoát không?")) {
                    activeExam = []; toScr('scr-modes');
                 }
            } else {
                 toScr('scr-modes'); 
            }
        }

        function confirmAndProceed() { try { toScr('scr-modes'); } catch(e) {} }
    </script>
</body>
</html>
